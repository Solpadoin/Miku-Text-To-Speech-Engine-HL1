[elevenlabs]
api_key = YOUR_ELEVEN_LABS_API
voice_id = YOUR_ELEVEN_LABS_VOICE_ID
model = eleven_multilingual_v2
stability = 0.5
similarity_boost = 0.75

[game]
# Path to the game log file
# Windows example: C:\Program Files (x86)\Steam\steamapps\common\Half-Life\qconsole.log
# Linux example: ~/.steam/steam/steamapps/common/Half-Life/qconsole.log
log_file = C:\Program Files (x86)\Steam\steamapps\common\Half-Life\qconsole.log

# Game process name (used to detect if game is running)
# Windows: hl.exe
# Linux: hl_linux
process_name = hl.exe

# Trigger keyword in chat (default: !miku)
trigger = !miku

# Push-to-talk key (the key bound to voice chat in game)
ptt_key = k

# Chat key
chat_key = y

[audio]
# Cooldown in seconds added after audio finishes playing
cooldown_extra = 2.0

# Voice Volume
volume = 100

# Target sample rate for audio output
sample_rate = 48000

[cache]
cache_dir = cache
cache_csv = cache/cache.csv

[app]
lock_file = miku_tts.lock
